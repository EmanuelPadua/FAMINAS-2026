<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Formulário</title>
    </head>

        <body>
            <p>Envie uma mensagem preenchendo o formulário abaixo</p>

            <form>
    
                <br><label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>

                <br><label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <br><label for="Idade">Idade:</label>
                <input type="number" id="Idade" name="Idade" required>

                <br><label for="Cidade">Cidade:</label>
                <select>
                    <option>São Paulo</option>
                    <option>Rio de Janeiro</option>
                    <option>Belo Horizonte</option>
                    <option>Pouso Alegre</option>
                </select>

                <br><label for="observacoes">Observações:</label>
                <textarea name="observacoes"></textarea>

                <br><button type="submit">Inscreva-se</button>

            </form>

</body>

</html>
