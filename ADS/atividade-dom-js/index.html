<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade DOM com JavaScript</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>

<body>
    <header>
        <h1 id="titulo-principal" class="titulo">Atividade de DOM</h1>
        <p id="subtitulo" class="texto">Praticando manipulação de elementos com JavaScr
            ipt.</p>
    </header>
    <main>
        <section id="secao-mensagem">
            <h2>Mensagens</h2>
            <p id="mensagem">Mensagem original.</p>
            <button id="btn-mudar-mensagem">Mudar mensagem</button>
            <button id="btn-limpar-mensagem">Limpar mensagem</button>
        </section>
        <section id="secao-estilo">
            <h2>Estilos</h2>
            <div id="caixa">Esta é uma caixa.</div>
            <button id="btn-cor-verde">Verde</button>
            <button id="btn-cor-azul">Azul</button>
            <button id="btn-destacar">Destacar</button>
            <button id="btn-remover-destaque">Remover destaque</button>
        </section>
        <section id="secao-formulario">
            <h2>Formulário simples</h2>
            <label for="input-nome">Nome:</label>
            <input id="input-nome" type="text" placeholder="Digite seu nome">
            <label for="input-idade">Idade:</label>
            <input id="input-idade" type="number" placeholder="Digite sua idade">
            <button id="btn-saudacao">Gerar saudação</button>
            <p id="resultado-formulario">Resultado aparecerá aqui.</p>
        </section>
        DOM JS 3
        <section id="secao-lista">
            <h2>Lista de tarefas</h2>
            <input id="input-tarefa" type="text" placeholder="Digite uma tarefa">
            <button id="btn-adicionar-tarefa">Adicionar tarefa</button>
            <button id="btn-remover-ultima">Remover última tarefa</button>
            <ul id="lista-tarefas">
                <li>Estudar HTML</li>
                <li>Estudar CSS</li>
            </ul>
        </section>
        <section id="secao-contador">
            <h2>Contador</h2>
            <p id="valor-contador">0</p>
            <button id="btn-incrementar">Incrementar</button>
            <button id="btn-decrementar">Decrementar</button>
            <button id="btn-zerar">Zerar</button>
        </section>
    </main>
</body>

</html>
